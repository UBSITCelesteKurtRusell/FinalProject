<section class="list-page">

  <header class="list-header">
    <div>
      <h1 class="list-title">Character Roster</h1>
      <p class="list-subtitle">{{ characters.length }} characters from the Grand Line</p>
    </div>
    <a routerLink="/builder" class="btn-add">+ Create Character</a>
  </header>

  <div class="filter-bar">
    <button [class.active]="filter === 'All'"    (click)="setFilter('All')">All</button>
    <button [class.active]="filter === 'Pirate'" (click)="setFilter('Pirate')">☠ Pirates</button>
    <button [class.active]="filter === 'Navy'"   (click)="setFilter('Navy')">⚓ Navy</button>
  </div>

  <p *ngIf="loading" class="state-msg">Loading the Grand Line...</p>
  <p *ngIf="error"   class="state-msg state-msg--error">{{ error }}</p>

  <div *ngIf="!loading && !error" class="character-grid">
    <app-character-card
      *ngFor="let c of filtered"
      [character]="c"
      (delete)="onDelete($event)">
    </app-character-card>
    <p *ngIf="filtered.length === 0" class="state-msg">No characters found.</p>
  </div>

</section>
