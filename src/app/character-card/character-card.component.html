<div class="card" [class.card--pirate]="character.affiliation === 'Pirate'" [class.card--navy]="character.affiliation === 'Navy'">

  <div class="card__top">
    <span class="card__faction">{{ character.affiliation || 'Unknown' }}</span>
    <span *ngIf="character.isCustom" class="card__custom">Custom</span>
  </div>

  <h3 class="card__name">{{ character.name }}</h3>
  <p class="card__role">{{ character.role || '—' }}</p>

  <div class="card__stats">
    <div class="stat">
      <span class="stat__label">Race</span>
      <span class="stat__value">{{ character.race || '—' }}</span>
    </div>
    <div class="stat">
      <span class="stat__label">Origin</span>
      <span class="stat__value">{{ character.origin || '—' }}</span>
    </div>
    <div class="stat">
      <span class="stat__label">Devil Fruit</span>
      <span class="stat__value">{{ character.devil_fruit || 'None' }}</span>
    </div>
    <div class="stat">
      <span class="stat__label">Bounty</span>
      <span class="stat__value">{{ character.bounty ? (character.bounty | number) + ' B' : '—' }}</span>
    </div>
  </div>

  <div class="card__actions" *ngIf="character.isCustom">
    <a [routerLink]="['/characters/edit', character._id]" class="btn-edit">Edit</a>
    <button class="btn-delete" (click)="onDelete()">Delete</button>
  </div>

</div>
